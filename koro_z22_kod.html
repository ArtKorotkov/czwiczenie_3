    <p>
        Koroktov – Informatyka to dziedzina zajmująca się przetwarzaniem informacji.
        Obejmuje projektowanie oprogramowania oraz analizę danych.
        Komputery wykonują operacje dzięki algorytmom zapisanym w kodzie.
        Programowanie pozwala tworzyć aplikacje ułatwiające codzienne życie.
    </p>
    <p id="gruby_korotkov">
        Koroktov – Sieci komputerowe umożliwiają komunikację między urządzeniami.
        Internet jest największą siecią na świecie i łączy miliony komputerów.
        Protokoły takie jak HTTP i TCP/IP odpowiadają za przesyłanie danych.
        Bezpieczeństwo w sieci jest kluczowe dla ochrony informacji.
    </p>
    <h1 id="dlawszystkich">
        Koroktov – Systemy operacyjne zarządzają zasobami komputera.
        Kontrolują pamięć, procesor oraz urządzenia wejścia i wyjścia.
        Najpopularniejsze systemy to Windows, Linux i macOS.
        Umożliwiają uruchamianie programów i interakcję z użytkownikiem.
    </h1>
    <div id="dlawszystkich">
        Koroktov – Bazy danych służą do przechowywania i zarządzania danymi.
        SQL jest językiem używanym do komunikacji z bazami danych.
        Dane mogą być przechowywane w tabelach i powiązane relacjami.
        Systemy baz danych są wykorzystywane w aplikacjach i stronach internetowych.
    </div>
</body>
